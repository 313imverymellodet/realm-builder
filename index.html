<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Builder</title>
    <style>
      /* Instant cold-start splash (before the JS/CSS bundle loads) */
      #boot {
        position: fixed; inset: 0; z-index: 100; display: flex;
        flex-direction: column; align-items: center; justify-content: center; gap: 22px;
        background: radial-gradient(circle at 50% 38%, #2c2620, #15110d 75%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        transition: opacity .5s ease; color: #ffd36b;
      }
      #boot.hide { opacity: 0; pointer-events: none; }
      #boot .crest { font-size: 64px; animation: bob 2.4s ease-in-out infinite; }
      #boot h1 { font-size: 30px; letter-spacing: .5px; }
      #boot .sub { color: #b3a187; font-size: 13px; margin-top: -12px; }
      #boot .ring { width: 38px; height: 38px; border-radius: 50%; border: 3px solid rgba(255,211,107,.2); border-top-color: #ffd36b; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="crest">🏰</div>
      <h1>Realm Builder</h1>
      <div class="sub">Raising your realm…</div>
      <div class="ring"></div>
    </div>
    <canvas id="app"></canvas>

    <!-- Top resource bar -->
    <div id="topbar">
      <div id="resbar"></div>
      <div id="topbtns">
        <button id="btn-age" class="tbtn gold">⚜️ Advance Age</button>
        <button id="btn-save" class="tbtn">💾 Save</button>
        <button id="btn-reset" class="tbtn">🔄 New</button>
        <button id="btn-mute" class="tbtn" title="Mute sound">🔊</button>
      </div>
    </div>

    <!-- Race panel: you vs rival + live objective -->
    <aside id="racepanel">
      <div class="rp-head">
        <span>⚔️ Race to the Wonder</span>
        <span id="rp-clock" class="rp-clock">0:00</span>
      </div>
      <div class="race-row">
        <span class="race-lbl you">👑 You</span>
        <div class="rp-bar"><div id="you-fill" class="you-fill"></div></div>
      </div>
      <div class="race-row">
        <span class="race-lbl rival">💀 Rival</span>
        <div class="rp-bar"><div id="rp-fill"></div></div>
        <button id="btn-rival" class="rp-view" title="Fly to the rival realm">👁</button>
      </div>
      <div id="quest" class="quest">🎯 <span id="quest-text">Grow your settlement</span></div>
    </aside>

    <!-- Selection panel -->
    <aside id="selpanel">
      <button id="sel-close" title="Close">✕</button>
      <div class="sel-head"><span id="sel-icon">🏛️</span>
        <div><div id="sel-name">Building</div><div id="sel-level" class="muted">Level 1 / 3</div></div>
      </div>
      <div id="sel-stats" class="sel-stats"></div>
      <button id="sel-upgrade" class="sel-btn up">Upgrade</button>
      <button id="sel-demolish" class="sel-btn dn">Demolish</button>
    </aside>

    <!-- Build bar -->
    <div id="buildbar"></div>

    <!-- Placement hint -->
    <div id="placehint"></div>

    <!-- Toasts -->
    <div id="toasts"></div>

    <!-- Modal (intro / win) -->
    <div id="modal"><div id="modal-content"></div></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
